# ─────────────────────────────────────────────────────────────────
# CRP 计算公式（V5.3 §14.3 使用）
# ─────────────────────────────────────────────────────────────────
crp_calculation_formulas:
  method_1_damodaran:
    description: "Damodaran方法：CRP = 主权CDS利差 × 股票/债券波动比"
    formula: >
      CRP = (Sovereign_CDS_Spread_bps / 10000) × (σ_equity / σ_bond)
      σ_equity / σ_bond 经验值：新兴市场约 1.5-2.0x；发达市场约 1.2-1.5x
    example:
      # example_only: true
      country: "以色列（战时，示例）"
      sovereign_cds_bps: 145
      equity_to_bond_vol_ratio: 1.6
      crp_pct: "1.45% × 1.6 = 2.32%（≈2.3%）"

  method_2_simplified:
    description: "简化方法：CRP ≈ Sovereign Default Spread（直接使用CDS利差）"
    formula: "CRP ≈ Sovereign_CDS_Spread_bps / 10000"
    note: "偏保守，适合快速估算；精确分析用方法1"

  wacc_integration:
    description: "在WACC中的应用"
    formula: >
      WACC_adjusted = WACC_domestic + CRP_country
      即：海外业务的折现率叠加对应国家CRP

# ─────────────────────────────────────────────────────────────────
# V5.3 使用规则
# ─────────────────────────────────────────────────────────────────
v5_3_usage_rules:
  forbidden_fallback: >
    禁止在黑天鹅事件（战争/危机）爆发后继续使用评级机构的静态国家评级来估算CRP。
    评级机构下调通常滞后实际事件 3-12 个月；CDS市场是实时的。
    必须使用本表当期 CDS 数据或更新的市场数据。
  mandatory_triggers:
    - "跨国资产估值，海外收入 > 30%（触发 C-014）"
    - "黑天鹅事件（战争/流动性危机）后 14 天内（触发 M-013）"
    - "涉及中东/东欧/新兴市场重大政治风险国家"
  update_frequency: >
    本文件建议每季度更新一次。危机期间（CDS单月变动 > 50bps）须即时更新。

notes:
  - "示例数据仅代表格式结构，部署时须替换为 Bloomberg/Markit 当期真实数据。"
  - "与 implied_erp_history.yml 组合使用，可构建完整的动态 ERP + CRP 校准体系。"
  - "V5.3 Agent-9 的 Dynamic Risk Calibration Engine 将自动调用本快照中最新数据。"
