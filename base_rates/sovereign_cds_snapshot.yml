# schema:
#   library: sovereign_cds_snapshot
#   version: string
#   description: string
#   data_sources: list[string]
#   last_updated: date
#   usage_in_v5_3: string
#   snapshot_date: date
#   countries: list[{country, region, cds_5y_bps, country_risk_premium_pct, notes, wartime_flag}]

# source: Bloomberg / Markit CDS Data / S&P Sovereign Ratings / Damodaran Country Risk Premium
# last_updated: "2026-04"
# usage_in_v5_3: >
#   §14.3 Dynamic Risk Calibration Engine (b) — 主权 CDS 利差替代国家信用评级，
#   用于跨国资产的国家风险溢价（Country Risk Premium, CRP）实时更新。
#   危机/战争期间主权 CDS 飙升速度远快于评级机构下调，是更及时的实时信号。
#   Agent-9 在跨国估值中强制调用本表代替静态 CRP 假设。
# example_only: true

library: sovereign_cds_snapshot
version: "1.0"
description: >
  主要国家/地区主权信用违约互换（Sovereign CDS）5年期利差快照，
  用于替代滞后的主权信用评级，实时更新跨国资产估值中的国家风险溢价（CRP）。
  CRP = 主权CDS利差 / (1 - Recovery Rate) × λ（调整系数，默认0.6-0.7）
  或简化公式：CRP ≈ Sovereign CDS Spread × Equity_to_Bond_Volatility_Ratio（约1.5-2x）

data_sources:
  - "Bloomberg Sovereign CDS Composite — 5Y USD CDS"
  - "Markit/DTCC — Sovereign CDS Net Notional"
  - "Damodaran Country Default Spreads and Risk Premiums (damodaran.com)"
  - "World Bank — Political Stability Index"

snapshot_date: "2026-04-01"  # example_only: true

# ─────────────────────────────────────────────────────────────────
# 主权 CDS 快照（example_only: true）
# ─────────────────────────────────────────────────────────────────
